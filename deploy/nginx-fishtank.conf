# fishtank.formationlabs.co.kr — Teams 탭 앱 (정적 SPA + API + WebSocket 단일 오리진)
# 배치 위치: docker-infra/nginx/conf.d/site-fishtank.conf
#
# 서버 관례 반영:
# - formationlabs.co.kr 은 공인 도메인이라 *.fllab.internal 전용 default.conf 리다이렉트/
#   와일드카드 인증서를 재사용할 수 없다. 아래 80 → 443 리다이렉트와 인증서 경로를
#   이 호스트 전용으로 직접 지정해야 한다(인증서는 별도 발급/준비 담당자 확인).
# - upstream 은 Docker 내장 DNS(127.0.0.11)로 런타임 해석 → dnsmasq 의존 없음,
#   컨테이너 재생성으로 IP 가 바뀌어도 nginx reload 불필요(zephoni-cw 와 동일 패턴)
#
# [중요] security-headers.conf 는 include 하지 않는다.
#   그 파일은 `X-Frame-Options: DENY` 를 넣어 Teams 의 iframe 임베드를 원천 차단한다.
#   프레임 제어는 앱이 응답에 실어 보내는 `Content-Security-Policy: frame-ancestors`
#   (teams.microsoft.com 등 허용)가 담당하므로, 여기서는 프레임 외 보안 헤더만 추가한다.
server {
    listen 80;
    server_name fishtank.formationlabs.co.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name fishtank.formationlabs.co.kr;

    # formationlabs.co.kr 와일드카드 인증서(docker-infra/nginx/ssl/ 에 이미 존재,
    # fllab.internal.crt 와 같은 배치 패턴). 현재는 mkcert 로 발급된 사설 인증서라
    # 사내 PC(루트 CA 배포됨)에서는 신뢰되지만, Microsoft 서버가 외부에서 직접
    # 검증하는 경로(Teams "앱 제출"/조직 카탈로그 등록)에는 사용할 수 없다.
    # 그 경로가 필요해지면 공인 CA(Let's Encrypt 등) 인증서로 교체해야 한다.
    ssl_certificate     /etc/nginx/ssl/formationlabs.co.kr.crt;
    ssl_certificate_key /etc/nginx/ssl/formationlabs.co.kr.key;

    # Teams 임베드 허용을 위해 X-Frame-Options / CSP 는 여기서 설정하지 않는다.
    # (프레임 정책은 앱의 frame-ancestors CSP 가 upstream 응답으로 전달됨)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 업로드되는 손그림(그림 JSON)을 위해 여유 있는 본문 크기 허용.
    client_max_body_size 2m;

    # 실시간 WebSocket (REQ-RT-001). Upgrade 헤더 전달 필수.
    location /realtime {
        resolver 127.0.0.11 valid=10s;
        set $upstream_fishtank http://fishtank-app:3000;
        proxy_pass $upstream_fishtank;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1h; # 유휴 WS 연결 유지
        include /etc/nginx/conf.d/_proxy-headers.inc;
    }

    # 정적 앱 + API (같은 fishtank-app 컨테이너가 모두 서빙).
    location / {
        resolver 127.0.0.11 valid=10s;
        set $upstream_fishtank http://fishtank-app:3000;
        proxy_pass $upstream_fishtank;
        proxy_set_header Host $host;
        include /etc/nginx/conf.d/_proxy-headers.inc;
    }
}
