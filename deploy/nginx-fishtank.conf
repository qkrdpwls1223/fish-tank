# fishtank.fllab.internal 가상 호스트 (기존 nginx 컨테이너의 conf.d 에 추가).
# - TLS 는 여기서 종단하고 앱 컨테이너(fishtank-app:3000)로 HTTP 프록시한다.
# - /realtime 은 WebSocket 이므로 Upgrade 헤더 전달이 필수다.
# - 인증서 경로는 기존 nginx 의 인증서 마운트 위치에 맞게 수정할 것.

server {
    listen 80;
    server_name fishtank.fllab.internal;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name fishtank.fllab.internal;

    ssl_certificate     /etc/nginx/certs/fishtank.fllab.internal.crt;
    ssl_certificate_key /etc/nginx/certs/fishtank.fllab.internal.key;

    # 실시간 WebSocket (REQ-RT-001)
    location /realtime {
        proxy_pass http://fishtank-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1h; # 유휴 WS 연결이 끊기지 않도록
    }

    # 정적 앱 + API
    location / {
        proxy_pass http://fishtank-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
